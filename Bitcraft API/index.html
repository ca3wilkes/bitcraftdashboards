<!DOCTYPE html>
<html>
<head>
  <title>Empire Dashboard</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <h1>Empire Dashboard</h1>

  <!-- FAVOURITES DROPDOWN -->
  <div id="favouriteContainer">
    <label><strong>Favourite Empires:</strong></label>
    <select id="favouriteSelect" onchange="loadEmpireFromFavourite()">
      <option value="">-- Select Favourite --</option>
    </select>
    <button onclick="favouriteCurrentEmpire()">⭐ Add to Favourites</button>
  </div>

  <!-- EMPIRE NAME HEADER -->
  <h2 id="empireHeader"></h2>

  <!-- EMPIRE INPUT -->
  <input id="empireId" placeholder="Enter Empire ID">
  <button onclick="loadMembers()">Load</button>
  <button id="refreshBtn" onclick="refreshData()">Refresh</button>

  <!-- DARK MODE -->
  <label class="switch">
    <input type="checkbox" onchange="toggleDarkMode()">
    <span class="slider"></span>
  </label>
  <span style="margin-left:10px;">Dark Mode</span>

  <br><br>

  <!-- SEARCH -->
  <input id="searchBox" placeholder="Search players..." oninput="filterPlayers()">

  <!-- OUTPUT -->
  <div id="output"></div>

  <!-- JS FILES -->
  <script src="app.js"></script>
  <script src="empires.js"></script>

</body>
</html>
