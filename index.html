<!DOCTYPE html>
<html>
<head>
  <title>Empire Dashboard</title>

  <style>
    :root {
      --bg: #f7f7f7;
      --text: #222;
      --card: white;
      --border: #ccc;
      --progress-bg: #ddd;
      --progress-fill: #4caf50;
      --progress-text: #000;

      --btn-bg: #e0e0e0;
      --btn-text: #222;
      --btn-hover: #d5d5d5;
    }

    .dark {
      --bg: #1e1e1e;
      --text: #e0e0e0;
      --card: #2a2a2a;
      --border: #444;
      --progress-bg: #333;
      --progress-fill: #76ff76;
      --progress-text: #fff;

      --btn-bg: #3a3a3a;
      --btn-text: #eee;
      --btn-hover: #4a4a4a;
    }

    body {
      font-family: Arial;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    .player {
      background: var(--card);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .expand-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      cursor: pointer;
      margin-right: 12px;
      font-size: 14px;
      transition: background 0.2s;
    }

    .expand-btn:hover {
      background: var(--btn-hover);
    }

    .expand-btn span {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .expanded .expand-btn span {
      transform: rotate(90deg);
    }

    .skills {
      display: none;
      margin-top: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      overflow: visible !important;
      position: relative;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    th {
      background: var(--border);
      cursor: pointer;
      position: relative;
      user-select: none;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .sort-arrow {
      margin-left: 6px;
      font-size: 12px;
      opacity: 0.7;
    }

    .resize-handle {
      position: absolute;
      right: 0;
      top: 0;
      width: 10px;
      height: 100%;
      cursor: col-resize;
      background: rgba(0,0,0,0.15);
      transition: background 0.2s;
    }

    .dark .resize-handle {
      background: rgba(255,255,255,0.2);
    }

    .resize-handle:hover {
      background: #2196f3;
    }

    .progress {
      width: 100%;
      height: 16px;
      background: var(--progress-bg);
      border-radius: 6px;
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: var(--progress-fill);
      display: block;
      min-width: 1px;
      transition: width 0.4s ease;
    }

    .progress-text {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: bold;
      color: var(--progress-text);
      pointer-events: none;
      line-height: 16px;
    }

    .tooltip {
      position: relative;
      display: inline-block;
      width: 100%;
      overflow: visible;
    }

    .tooltip .tooltiptext {
      visibility: hidden;
      width: 240px;
      background-color: var(--card);
      color: var(--text);
      text-align: left;
      border-radius: 6px;
      border: 1px solid var(--border);
      padding: 10px;
      position: absolute;
      z-index: 9999;
      bottom: 140%;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.3s;
      font-size: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      white-space: normal;
    }

    .tooltip:hover .tooltiptext {
      visibility: visible;
      opacity: 1;
    }

    #searchBox {
      padding: 8px;
      width: 250px;
      margin: 20px 0;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
      margin-left: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 26px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    .switch input:checked + .slider {
      background-color: #4caf50;
    }

    .switch input:checked + .slider:before {
      transform: translateX(24px);
    }

    #refreshBtn {
      margin-left: 10px;
      padding: 8px 12px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #refreshBtn:hover {
      background: #43a047;
    }
  </style>
</head>

<body>
  <div>
    <a href="=index.html"> Home </a>
  </div>
  <h1>Empire Dashboard</h1>

  <input id="empireId" placeholder="Enter Empire ID">
  <button onclick="loadMembers()">Load</button>
  <button id="refreshBtn" onclick="refreshData()">Refresh</button>

  <label class="switch">
    <input type="checkbox" onchange="toggleDarkMode()">
    <span class="slider"></span>
  </label>
  <span style="margin-left:10px;">Dark Mode</span>

  <br><br>

  <input id="searchBox" placeholder="Search players..." oninput="filterPlayers()">

  <div id="output"></div>

  <script>
    let loadedPlayers = [];
    let sortState = {};
    let expandedPlayers = new Set();

    async function loadMembers() {
      const id = document.getElementById("empireId").value.trim();
      if (!id) return alert("Enter an empire ID");

      const res = await fetch(`/api/empires?id=${encodeURIComponent(id)}`);
      const data = await res.json();

      loadedPlayers = data;
      expandedPlayers = new Set();
      renderPlayers(data);
    }

    async function refreshData() {
      if (!document.getElementById("empireId").value.trim()) return;
      await loadMembers();
    }

    function sortSkills(skills, key) {
      if (!sortState[key]) sortState[key] = "asc";
      else if (sortState[key] === "asc") sortState[key] = "desc";
      else sortState[key] = null;

      if (!sortState[key]) return skills;

      return [...skills].sort((a, b) => {
        if (sortState[key] === "asc") return a[key] > b[key] ? 1 : -1;
        return a[key] < b[key] ? 1 : -1;
      });
    }

    function renderPlayers(players) {
      const container = document.getElementById("output");
      container.innerHTML = "";

      players.forEach(player => {
        const div = document.createElement("div");
        div.className = "player";

        let sortedSkills = [...player.experience];

        let rows = sortedSkills.map(skill => {
          const percent = (skill.progress * 100).toFixed(1);
          const needed = skill.next_level_xp ? (skill.next_level_xp - skill.quantity) : 0;

          return `
          <tr>
            <td>${skill.icon} ${skill.skill_name}</td>
            <td>${skill.quantity.toLocaleString()}</td>
            <td>${skill.level}</td>
            <td>
              <div class="tooltip">
                <div class="progress">
                  <div class="progress-bar" style="width:${percent}%"></div>
                  <div class="progress-text">${percent}%</div>
                </div>
                <div class="tooltiptext">
                  <strong>Level ${skill.level} → ${skill.level + 1}</strong><br>
                  XP: ${skill.quantity.toLocaleString()} / ${skill.next_level_xp?.toLocaleString() ?? "MAX"}<br>
                  Needed: ${needed.toLocaleString()} XP<br>
                  Progress: ${percent}%
                </div>
              </div>
            </td>
          </tr>`;
        }).join("");

        const isExpanded = expandedPlayers.has(String(player.id));

        div.innerHTML = `
          <div class="header ${isExpanded ? "expanded" : ""}">
            <button class="expand-btn" onclick="toggleSkills('${player.id}', this)">
              <span>${isExpanded ? "▼" : "►"}</span>
            </button>

            <h2 style="margin:0; flex-grow:1;">${player.name}</h2>

            <div>
              <strong>Total XP:</strong> ${player.totalXP.toLocaleString()} |
              <strong>Total Levels:</strong> ${player.totalLevels}
            </div>
          </div>

          <div id="skills-${player.id}" class="skills" style="display:${isExpanded ? "block" : "none"};">
            <table>
              <thead>
                <tr>
                  <th onclick="sortColumn(event, '${player.id}', 'skill_name')">
                    Skill <span class="sort-arrow" id="arrow-${player.id}-skill_name"></span>
                    <div class="resize-handle"></div>
                  </th>
                  <th onclick="sortColumn(event, '${player.id}', 'quantity')">
                    XP <span class="sort-arrow" id="arrow-${player.id}-quantity"></span>
                    <div class="resize-handle"></div>
                  </th>
                  <th onclick="sortColumn(event, '${player.id}', 'level')">
                    Level <span class="sort-arrow" id="arrow-${player.id}-level"></span>
                    <div class="resize-handle"></div>
                  </th>
                  <th>
                    Progress
                    <div class="resize-handle"></div>
                  </th>
                </tr>
              </thead>
              <tbody id="tbody-${player.id}">${rows}</tbody>
            </table>
          </div>
        `;

        container.appendChild(div);
      });

      enableColumnResizing();
    }

    function toggleSkills(id, btn) {
      const el = document.getElementById(`skills-${id}`);
      const expanded = el.style.display === "block";
      const key = String(id);

      if (expanded) {
        el.style.display = "none";
        expandedPlayers.delete(key);
      } else {
        el.style.display = "block";
        expandedPlayers.add(key);
      }

      btn.parentElement.classList.toggle("expanded", !expanded);
      btn.querySelector("span").textContent = expanded ? "►" : "▼";
    }

    function sortColumn(event, playerId, key) {
      event.stopPropagation();

      const player = loadedPlayers.find(p => String(p.id) === String(playerId));
      if (!player) return;

      player.experience = sortSkills(player.experience, key);

      const tbody = document.getElementById(`tbody-${playerId}`);
      if (!tbody) return;

      const rows = player.experience.map(skill => {
        const percent = (skill.progress * 100).toFixed(1);
        const needed = skill.next_level_xp ? (skill.next_level_xp - skill.quantity) : 0;

        return `
          <tr>
            <td>${skill.icon} ${skill.skill_name}</td>
            <td>${skill.quantity.toLocaleString()}</td>
            <td>${skill.level}</td>
            <td>
              <div class="tooltip">
                <div class="progress">
                  <div class="progress-bar" style="width:${percent}%"></div>
                  <div class="progress-text">${percent}%</div>
                </div>
                <div class="tooltiptext">
                  <strong>Level ${skill.level} → ${skill.level + 1}</strong><br>
                  XP: ${skill.quantity.toLocaleString()} / ${skill.next_level_xp?.toLocaleString() ?? "MAX"}<br>
                  Needed: ${needed.toLocaleString()} XP<br>
                  Progress: ${percent}%
                </div>
              </div>
            </td>
          </tr>`;
      }).join("");

      tbody.innerHTML = rows;

      // Clear all arrows for this player
      ["skill_name", "quantity", "level"].forEach(col => {
        const arrow = document.getElementById(`arrow-${playerId}-${col}`);
        if (arrow) arrow.textContent = "";
      });

      // Set arrow for the sorted column
      const arrow = document.getElementById(`arrow-${playerId}-${key}`);
      if (arrow) {
        if (sortState[key] === "asc") arrow.textContent = "▲";
        else if (sortState[key] === "desc") arrow.textContent = "▼";
        else arrow.textContent = "";
      }
    }

    function filterPlayers() {
      const q = document.getElementById("searchBox").value.toLowerCase();
      const filtered = loadedPlayers.filter(p => p.name.toLowerCase().includes(q));
      renderPlayers(filtered);
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }

    function enableColumnResizing() {
      document.querySelectorAll(".resize-handle").forEach(handle => {
        handle.addEventListener("mousedown", e => {
          const th = e.target.parentElement;
          const startX = e.pageX;
          const startWidth = th.offsetWidth;

          document.onmousemove = function (e) {
            th.style.width = (startWidth + (e.pageX - startX)) + "px";
          };

          document.onmouseup = function () {
            document.onmousemove = null;
            document.onmouseup = null;
          };
        });
      });
    }
  </script>

</body>
</html>
